<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Reprodutor de Música</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121212;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.player{
    width:420px;
    background:#1e1e1e;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

#musicName{
    font-size:20px;
    text-align:center;
    margin-bottom:15px;
    color:#1db954;
}

.progress-container{
    width:100%;
    height:8px;
    background:#555;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
}

.progress{
    width:0%;
    height:100%;
    background:#1db954;
    border-radius:10px;
}

.time{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
    font-size:12px;
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin:20px 0;
}

button{
    background:#1db954;
    border:none;
    color:white;
    width:55px;
    height:55px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.1);
}

.volume{
    margin-top:15px;
}

input[type=range]{
    width:100%;
}

.playlist{
    margin-top:20px;
    max-height:220px;
    overflow:auto;
}

.playlist div{
    padding:12px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.playlist div:hover{
    background:#2b2b2b;
}

.active{
    background:#1db954 !important;
}
</style>

</head>
<body>

<div class="player">

<h2>🎵 Meu Player</h2>

<div id="musicName">Carregando...</div>

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="controls">
<button onclick="previous()">⏮</button>
<button onclick="playPause()" id="playBtn">▶</button>
<button onclick="next()">⏭</button>
</div>

<div class="volume">
Volume
<input type="range" min="0" max="1" step="0.01" value="1" id="volume">
</div>

<div class="playlist" id="playlist"></div>

<audio id="audio"></audio>

</div>

<script>

// ===============================
// COLOQUE SUAS MÚSICAS AQUI
// ===============================

const playlist = [

{
title:"Música 1",
file:"ALL OF ME instrumental (violino) - John Legend - música para casamento.mp3"
},

{
title:"Música 2",
file:"Música encontro de casais.mp3"
},

{
title:"Música 3",
file:"musica3.mp3"
},

{
title:"Música 4",
file:"musica4.mp3"
}

];

// ===============================

const audio = document.getElementById("audio");
const musicName = document.getElementById("musicName");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const volume = document.getElementById("volume");
const playlistDiv = document.getElementById("playlist");

let currentMusic = 0;

function loadMusic(index){

audio.src = playlist[index].file;
musicName.innerHTML = playlist[index].title;

document.querySelectorAll(".playlist div").forEach((item,i)=>{
item.classList.toggle("active",i===index);
});

}

function playPause(){

if(audio.paused){
audio.play();
playBtn.innerHTML="⏸";
}else{
audio.pause();
playBtn.innerHTML="▶";
}

}

function next(){

currentMusic++;

if(currentMusic>=playlist.length)
currentMusic=0;

loadMusic(currentMusic);
audio.play();
playBtn.innerHTML="⏸";

}

function previous(){

currentMusic--;

if(currentMusic<0)
currentMusic=playlist.length-1;

loadMusic(currentMusic);
audio.play();
playBtn.innerHTML="⏸";

}

audio.addEventListener("ended",next);

audio.addEventListener("timeupdate",()=>{

const percent=(audio.currentTime/audio.duration)*100;
progress.style.width=percent+"%";

current.innerHTML=format(audio.currentTime);
duration.innerHTML=format(audio.duration);

});

function format(sec){

if(isNaN(sec)) return "0:00";

let min=Math.floor(sec/60);
let s=Math.floor(sec%60);

if(s<10) s="0"+s;

return min+":"+s;

}

progressContainer.addEventListener("click",(e)=>{

const width=progressContainer.clientWidth;
const click=e.offsetX;

audio.currentTime=(click/width)*audio.duration;

});

volume.addEventListener("input",()=>{

audio.volume=volume.value;

});

playlist.forEach((music,index)=>{

const item=document.createElement("div");

item.innerHTML=music.title;

item.onclick=()=>{

currentMusic=index;
loadMusic(index);
audio.play();
playBtn.innerHTML="⏸";

};

playlistDiv.appendChild(item);

});

loadMusic(currentMusic);

</script>

</body>
</html>
